<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>示例棋牌项目智能客服 Agent Debug</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="side-panel">
        <div class="brand-block">
          <div class="brand-mark">AI</div>
          <div>
            <h1>示例棋牌项目客服 Agent</h1>
            <p>Debug：规则问答 · 反馈收集 · 工单流转</p>
          </div>
        </div>

        <section class="panel-section">
          <h2>正式入口</h2>
          <div class="data-status">
            <a class="text-link" href="./player.html">玩家端 WebView</a>
            <a class="text-link" href="./ops.html">产品运营端工作台</a>
          </div>
        </section>

        <section class="panel-section">
          <h2>快捷入口</h2>
          <div id="quickReplies" class="quick-list"></div>
        </section>

        <section class="panel-section">
          <h2>当前识别</h2>
          <dl id="inspector" class="inspector">
            <div><dt>意图</dt><dd>-</dd></div>
            <div><dt>分类</dt><dd>-</dd></div>
            <div><dt>优先级</dt><dd>-</dd></div>
            <div><dt>动作</dt><dd>-</dd></div>
          </dl>
        </section>

        <section class="panel-section">
          <h2>本地数据</h2>
          <div class="data-status">
            <span id="kbCount">知识库：加载中</span>
            <span id="feedbackCount">反馈：0</span>
          </div>
        </section>

        <section class="panel-section">
          <h2>反馈工单</h2>
          <div id="ticketList" class="ticket-list"></div>
        </section>
      </aside>

      <main class="chat-panel">
        <header class="chat-header">
          <div>
            <h2>玩家客服入口</h2>
            <p>输入玩法、活动、充值、BUG、举报或建议问题。</p>
          </div>
          <button id="resetBtn" class="ghost-button" type="button">清空对话</button>
        </header>

        <section id="messages" class="messages" aria-live="polite"></section>

        <section id="ticketDetail" class="ticket-detail hidden" aria-live="polite"></section>

        <form id="composer" class="composer">
          <input
            id="messageInput"
            type="text"
            autocomplete="off"
            placeholder="例如：黄金牌活动炸弹怎么算？"
          />
          <button type="submit">发送</button>
        </form>
      </main>
    </div>

    <script src="./agent-core.js"></script>
    <script src="./feishu-adapter.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
